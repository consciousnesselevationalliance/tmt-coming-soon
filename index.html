<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ThinkMyThought</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #000;
    color: #e5e7eb;
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    max-width: 720px;
    padding: 40px;
    border-radius: 20px;
    border: 1px solid rgba(139, 92, 246, 0.4);
    background: rgba(0, 0, 0, 0.6);
    box-shadow: 0 0 60px rgba(139, 92, 246, 0.25);
  }

  h1 {
    font-size: 48px;
    margin-bottom: 20px;
    font-weight: 600;
  }

  .tagline {
    color: #9ca3af;
    font-size: 18px;
    margin-bottom: 10px;
  }

  .sub {
    color: #6b7280;
    margin-bottom: 40px;
  }

  form {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  input[type="email"] {
    flex: 1;
    padding: 14px;
    background: #000;
    border: 1px solid rgba(139, 92, 246, 0.4);
    border-radius: 8px;
    color: white;
    font-size: 14px;
  }

  input[type="email"]:focus {
    outline: none;
    border-color: #8b5cf6;
  }

  button {
    padding: 14px 22px;
    background: #8b5cf6;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s ease;
  }

  button:hover {
    background: #7c3aed;
  }

  .footer {
    margin-top: 30px;
    font-size: 12px;
    color: #4b5563;
  }

  .cursor {
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
  }
</style>
</head>

<body>

<div class="container">

  <h1>&gt;_ ThinkMyThought<span class="cursor">|</span></h1>

  <div class="tagline">
    Recenter · Think clearly · Share protected ideas
  </div>

  <div class="sub">
    Launching soon. Publish timestamped ideas and invite aligned collaborators.
  </div>

  <div style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap;">
    <a 
      href="https://docs.google.com/forms/d/e/1FAIpQLSehWzH2MtpFh5lKI_5cXyWVTKaZggDwBN5LE76YoO-Uet309w/viewform" 
      target="_blank"
      style="padding:14px 22px; background:#8b5cf6; border-radius:8px; color:white; text-decoration:none; font-weight:500;"
    >
      Request Early Access
    </a>
  </div>

  <div class="footer">
    © 2026 Consciousness Elevation Alliance
  </div>

</div>

</body>
</html>
